name: 'Prepare Docker Buildx environment'
description: 'Downloads and extracts the TagLib library, adding it to PKG_CONFIG_PATH'
inputs:
  github_token:
    description: 'GitHub token'
    required: true
    default: ''
outputs:
  tags:
    description: 'Docker image tags'
    value: ${{ steps.meta.outputs.tags }}
  labels:
    description: 'Docker image labels'
    value: ${{ steps.meta.outputs.labels }}
  annotations:
    description: 'Docker image annotations'
    value: ${{ steps.meta.outputs.annotations }}
  version:
    description: 'Docker image version'
    value: ${{ steps.meta.outputs.version }}
runs:
  using: 'composite'
  steps:
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github_token }}

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4

    - name: Extract metadata for Docker image
      id: meta
      uses: docker/metadata-action@v6
      with:
        github-token: ${{ inputs.github_token }}
        labels: |
          maintainer=deluan@navidrome.org
        images: |
          name=ghcr.io/ruckus-dj/navidrome-ldap
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,format=long,enable={{is_default_branch}}
